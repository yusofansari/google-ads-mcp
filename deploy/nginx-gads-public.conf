# MCP Server: Google Ads (Public/Multi-tenant)
# MCP endpoint + OAuth sub-routes
location /mcp/gads {
    proxy_pass http://127.0.0.1:8102;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:8102;
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    proxy_buffering off;
    chunked_transfer_encoding on;
    proxy_cache off;
}

# OAuth protected resource metadata (RFC 9728)
location /.well-known/oauth-protected-resource/mcp/gads {
    proxy_pass http://127.0.0.1:8102;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:8102;
    proxy_set_header Origin "";
}

# OAuth authorization server metadata (RFC 8414)
location /.well-known/oauth-authorization-server/mcp/gads {
    proxy_pass http://127.0.0.1:8102;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:8102;
    proxy_set_header Origin "";
}
